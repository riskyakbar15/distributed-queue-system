# ============================================================
# Docker Compose: seluruh sistem antrean terdistribusi.
# Menjalankan: PostgreSQL + Redis + 3 instance backend + Nginx (load balancer).
# Jalankan: docker compose up --build
# Akses:    http://localhost
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: queue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Skema + seed admin dijalankan sekali saat volume masih kosong.
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/seed-admin.sql:/docker-entrypoint-initdb.d/02-seed-admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d queue_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app1:
    build: .
    environment: &app-env
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: queue_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECRET: ubah-menjadi-rahasia-yang-kuat
      INSTANCE_NAME: app1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app2:
    build: .
    environment:
      <<: *app-env
      INSTANCE_NAME: app2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app3:
    build: .
    environment:
      <<: *app-env
      INSTANCE_NAME: app3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/queue.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
      - app3

volumes:
  pgdata:
