# ============================================================
# Docker Compose: seluruh sistem antrean terdistribusi.
# Menjalankan: PostgreSQL + Redis + 3 instance backend + Nginx (load balancer).
# Jalankan: docker compose up --build
# Akses:    http://localhost
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: queue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Skema + seed admin dijalankan sekali saat volume masih kosong.
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/seed-admin.sql:/docker-entrypoint-initdb.d/02-seed-admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d queue_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app1:
    build: .
    restart: unless-stopped
    environment: &app-env
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: queue_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECRET: ubah-menjadi-rahasia-yang-kuat
      INSTANCE_NAME: app1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app2:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
      INSTANCE_NAME: app2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app3:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
      INSTANCE_NAME: app3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app1
      - app2
      - app3

volumes:
  pgdata:
  caddy_data:
  caddy_config:
