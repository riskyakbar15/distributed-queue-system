# ============================================================
# Konfigurasi Nginx sebagai reverse proxy + load balancer
# Salin ke /etc/nginx/sites-available/ lalu aktifkan (Linux),
# atau sertakan pada nginx.conf (Windows).
# ============================================================

upstream queue_backend {
    # Metode default: round-robin.
    # max_fails + fail_timeout: instance yang gagal beberapa kali akan
    # dikeluarkan sementara dari rotasi (mendukung fault tolerance).
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://queue_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Header untuk mendukung WebSocket (Socket.IO).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Jika instance mati, coba instance berikutnya.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
