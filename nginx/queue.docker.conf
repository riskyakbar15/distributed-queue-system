# ============================================================
# Konfigurasi Nginx untuk lingkungan Docker Compose.
# Upstream menunjuk ke nama service container (app1/app2/app3)
# yang di-resolve otomatis oleh DNS internal Docker.
# ============================================================

upstream queue_backend {
    server app1:3000 max_fails=3 fail_timeout=10s;
    server app2:3000 max_fails=3 fail_timeout=10s;
    server app3:3000 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://queue_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Header untuk mendukung WebSocket (Socket.IO).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Jika instance mati, coba instance berikutnya.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
